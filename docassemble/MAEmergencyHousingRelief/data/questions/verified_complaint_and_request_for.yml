---
id: Tell Us About the Case
question: |
  What happened between you and your landlord
subquestion: |
  Briefly describe the facts, date, and time of events (if any) that have occurred
fields:
  - "Description of events and facts": facts_description
---
id: Describe Other Issues
question: |
  Describe other violations
subquestion: |
  What other issues related to your case.
fields:
  - "Type of other issue": other_issues_type
---
id: Request to the Court
question: |
  Request to the Court
subquestion: |
  What would you like the Court to do?
fields:
  - "Provide my utilities": utilities_needed
    datatype: yesno
---
id: preview verified_complaint_and_request_for
question: |
  Preview your form before you sign it
subquestion: |
  Here is a preview of the form you will sign on the next page.   
  
  ${ al_court_bundle.as_pdf(key='preview') }

  Click the image to open it in a new tab. Click the "Edit answers" button
  to edit your answers.

  ${ action_button_html(url_action('review_verified_complaint_and_request_for'), label='Edit answers', color='info') }
  
  Remember to come back to this window to continue and sign your form.
continue button field: verified_complaint_and_request_for_preview_question    
---
code: |
  signature_fields = ['plaintiffs[0].signature']
---
id: verified complaint and request for review screen
event: review_verified_complaint_and_request_for
question: |
  Review your answers
review:
  - Edit: plaintiffs.revisit
    button: |
      **Plaintiffs**

      % for item in plaintiffs:
        * ${ item }
      % endfor
  - Edit: defendants.revisit
    button: |
      **Defendants**

      % for item in defendants:
        * ${ item }
      % endfor
  - Edit: trial_court
    button: |
      **Trial court**
  
      % if defined("trial_court.name.first"):
      * name: ${ trial_court.name_full() }
      % endif
  - Edit: utilities_needed_type
    button: |
      **Type of needed utility or service**:
      ${ utilities_needed_type }
  - Edit: other_court_request_type
    button: |
      **Type of other request to court**:
      ${ other_court_request_type }
  - Edit: other_issues_type
    button: |
      **Type of other issue**:
      ${ other_issues_type }
  - Edit: signature_date
    button: |
      **Date of Signature**:
      ${ signature_date }
  - Edit: docket_number
    button: |
      **Docket number**:
      ${ docket_number }
  - Edit: facts_description
    button: |
      **Description of events and facts**:
      > ${ single_paragraph(facts_description) }
---
id: edit plaintiffs
continue button field: plaintiffs.revisit
question: |
  Edit plaintiffs
subquestion: |
  ${ plaintiffs.table }

  ${ plaintiffs.add_action() }
---
table: plaintiffs.table
rows: plaintiffs
columns:
  - Address: |
      row_item.address.block() if defined("row_item.address.address") else ""
  - Name: |
      row_item.name_full() if defined("row_item.name.first") else ""
  - Phone number: |
      row_item.phone_number if defined("row_item.phone_number") else ""
  - Signature: |
      row_item.signature if defined("row_item.signature") else ""
  - Email: |
      row_item.email if defined("row_item.email") else ""
edit:
  - address.address
  - name.first
  - phone_number
  - signature
  - email
confirm: True
---
id: edit defendants
continue button field: defendants.revisit
question: |
  Edit defendants
subquestion: |
  ${ defendants.table }

  ${ defendants.add_action() }
---
table: defendants.table
rows: defendants
columns:
  - Name: |
      row_item.name_full() if defined("row_item.name.first") else ""
  - Phone number: |
      row_item.phone_number if defined("row_item.phone_number") else ""
  - Address: |
      row_item.address.block() if defined("row_item.address.address") else ""
  - Email: |
      row_item.email if defined("row_item.email") else ""
edit:
  - name.first
  - phone_number
  - address.address
  - email
confirm: True
---
id: download verified_complaint_and_request_for
event: verified_complaint_and_request_for_download
question: |
  All done
subquestion: |
  Thank you ${users}. Your form is ready to download and deliver.
  
  View, download and send your form below. Click the "Edit answers" button to fix any mistakes.

  ${ action_button_html(url_action('review_verified_complaint_and_request_for'), label='Edit answers', color='info') }
  
  
  ${ al_user_bundle.download_list_html() }
  

  ${ al_user_bundle.send_button_html(show_editable_checkbox=True) }

progress: 100
---
# ALDocument objects specify the metadata for each template
objects:
  - verified_complaint_and_request_for_Post_interview_instructions: ALDocument.using(title="Instructions", filename="verified_complaint_and_request_for_next_steps.docx", enabled=True, has_addendum=False)
  - verified_complaint_and_request_for_attachment: ALDocument.using(title="Verified complaint and request for emergency relief", filename="verified_complaint_and_request_for", enabled=True, has_addendum=False, )
---
# Bundles group the ALDocuments into separate downloads, such as for court and for the user
objects:
  - al_user_bundle: ALDocumentBundle.using(elements=[verified_complaint_and_request_for_Post_interview_instructions, verified_complaint_and_request_for_attachment], filename="verified_complaint_and_request_for", title="All forms to download for your records", enabled=True)
  - al_court_bundle: ALDocumentBundle.using(elements=[verified_complaint_and_request_for_attachment],  filename="verified_complaint_and_request_for", title="All forms to deliver to court", enabled=True)
---
# Each attachment defines a key in an ALDocument. We use `i` as the placeholder here so the same template is 
# used for "preview" and "final" keys, and logic in the template checks the value of 
# `i` to show or hide the user's signature
attachment:
  name: Post-interview-Instructions
  filename: verified_complaint_and_request_for_next_steps
  docx template file: verified_complaint_and_request_for_next_steps.docx
  variable name: verified_complaint_and_request_for_Post_interview_instructions[i]
  skip undefined: True
  tagged pdf: True
---
attachment:
  name: verified complaint and request for
  filename: verified_complaint_and_request_for
  variable name: verified_complaint_and_request_for_attachment[i]
  skip undefined: True
  docx template file: verified_complaint_and_request_for.docx
  tagged pdf: True



