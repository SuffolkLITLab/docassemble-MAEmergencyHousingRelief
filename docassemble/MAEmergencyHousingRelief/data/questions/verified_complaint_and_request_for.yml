---
id: your contact information
question: |
  % if al_person_answering == "user":
  What is your contact information?
  % else:
  What is ${ users[0] }'s contact information?
  % endif
subquestion: |
  % if al_person_answering == "user":
  Include at least **one** way to reach you other than by mail.
  % else:
  Include at least **one** way to reach ${ users[0] } other than by mail.
  % endif

  ${ collapse_template(why_contact_info_needed_template) }
fields:  
  - Phone number: users[0].phone_number
    required: False
    datatype: al_international_phone
  - Email address: users[0].email    
    datatype: email
    required: False
  - label: |
      % if al_person_answering == "user":
      Other ways to reach you
      % else:
      Other ways to reach ${ users[0] }
      % endif
    field: users[0].other_contact_method
    input type: area
    required: False
    help: |
      If you do not have a phone number or email, provide
      specific contact instructions. For example, use a friend's phone number.
      But the friend must be someone you can rely on to give you a
      message.
validation code: |
  if (
    not showifdef("users[0].phone_number")
    and (not showifdef("users[0].mobile_number"))
    and (not showifdef("users[0].email"))
    and (not showifdef("users[0].other_contact_method"))
  ):
    validation_error(
      word("You need to provide at least one contact method."),
      field="users[0].other_contact_method",
    )
---
comment: |
  This block includes the logic for standalone interviews.
  Delete mandatory: True to include in another interview
mandatory: True
code: |
  al_intro_screen
  verified_complaint_and_request_for_intro
