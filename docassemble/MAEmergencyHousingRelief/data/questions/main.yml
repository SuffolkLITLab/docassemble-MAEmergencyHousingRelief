question: |
  Before you ask the court for emergency help
subquestion: |
 You can only ask for a **Temporary Restraining Order** or a **Short Order
  of Notice** at the same time you file your complaint. They are part of
  starting your case. You cannot add them to a case later.

  A **Preliminary Injunction** is different. You can ask for one when you
  file your complaint, or later on while your case is still open.
