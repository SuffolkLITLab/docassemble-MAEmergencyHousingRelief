  What are you asking the court to do?
subquestion: |
  You told us about the following problems:

  % if violation_breach_contract:
  * Your landlord breached your lease agreement
  % endif
  % if utilities_needed:
  * Your landlord shut off your utilities or did not pay for utilities they 
  are required to pay
  % endif
  % if violation_bad_conditions:
  * Your landlord breached your implied warranty of habitability by not making necessary repairs
  % endif
  
  We have already checked the boxes that make sense based on your earlier
  answers, but you should review and make any changes as needed.

  Check the boxes that apply below.
fields:
  - 'Stop trying to evict me from my home': stop_eviction
    datatype: yesno
  - 'Provide me utilities': utilities_needed
    datatype: yesno
    default: ${ utilities_needed }
  - 'What utilities do you need back?': utilities_needed_type
    datatype: text
    show if: utilities_needed
  - 'Make repairs to my home': stop_fail_repairs
    datatype: yesno
    default: ${ violation_bad_conditions }
  - 'Return my belongings': stop_return_belongings
    datatype: yesno
  - 'Other request for the court': other_court_request
    datatype: yesno
  - 'What do you want the court to do?': other_court_request_type
    datatype: text
    show if: other_court_request
    
validation code: |
  if not showifdef('utilities_needed') and not showifdef('stop_eviction') and not showifdef('stop_fail_repairs') and not showifdef('stop_return_belongings') and not showifdef('other_court_request'):
      validation_error("You must ask the court to do at least one thing.")
