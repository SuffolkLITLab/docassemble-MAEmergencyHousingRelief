id: assessment active emergency
question: |
  Will you suffer severe harm if the judge does not step in today?
subquestion: |
  You already told us about the problems you are having with your landlord. Now we need to know how fast the court must act. 

  **Choose Yes if:**
  Your situation is an extreme crisis, and waiting even 24 to 48 hours would cause severe harm to your health, safety, or property.
fields:
  - no label: emergency_today
    datatype: yesnoradio
---
id: assessment danger warning
question: |
  Would warning your landlord about this court case put you or your property in immediate danger?
subquestion: |
  Usually, the court requires you to tell your landlord before a judge makes a decision. 

  #### **Choose Yes if:**
  * You believe your landlord will destroy your belongings if they find out you are going to court.
  * You believe your landlord will immediately lock you out if warned.
  * You have a reasonable fear for your physical safety if the landlord is notified beforehand.
fields:
  - no label: emergency_danger_warning
    datatype: yesnoradio
---
id: assessment fast hearing
question: |
  Do you need a judge to hear your case in the next few days?
subquestion: |
  Normally, court hearings take several weeks to schedule. 

  **Choose Yes if:**
  Your living situation is unsafe or highly unstable, and you can wait 2 or 3 days, but you cannot wait weeks for a standard court date.
fields:
  - no label: emergency_soon_hearing
    datatype: yesnoradio
---
id: assessment ongoing protection
question: |
  Do you need a court order that protects you for the next few months?
subquestion: |
  Some emergency court orders only last for 10 days. 

  #### **Choose Yes if:**
  * You need an ongoing rule that lasts until your entire lawsuit is completely finished. 
  * *Example:* An order pausing an eviction, or an order forcing your landlord to keep the utilities on while the judge reviews your full case over the coming months.
fields:
  - no label: emergency_ongoing_protection
    datatype: yesnoradio
---
id: issue a tro
question: |
  It sounds like you may need a Temporary Restraining Order
subquestion: |
  Based on what you have told us, it sounds like you may benefit from a Temporary Restraining Order. 
  
  ##### What is a Temporary Restraining Order (TRO)?
  An emergency court order telling your landlord to stop doing something illegal or to fix a dangerous problem in your home right away. 

  **How long does a TRO last?**
  A TRO works fast, but it is only good for about 10 days. After that, you and your landlord will go to a full court hearing where a judge will decide what happens next. 

  #### **How would a TRO benefit you?**
  * Stop your landlord from breaching your contract
  * Stop your landlord from shutting off your utilities
  * Order your landlord to make emergency repairs right away
  * Stop your landlord from trying to evict you from your home
  * Order your landlord to return your belongings
  
fields:
  - 'Do you want a Temporary Restraining Order?': issue_a_tro
    datatype: yesnoradio
---
id: issue a short order of notice
question: |
  It sounds like you may need a Short Order of Notice
subquestion: |
  Based on what you have told us, it sounds like you may benefit from a Short Order of Notice. 
  
  #####What is a Short Order of Notice?
  A Short Order of Notice is a procedural tool used to bypass standard court timelines when a matter is urgent. Typically, courts require you to give a landlord a specific amount of advance notice before a hearing.

  **Why is this important?**
  If you are facing an emergency, you cannot wait the standard amount of time. This asks the court to shrink that waiting period, allowing the judge to hear your emergency request much sooner.

  **How would a Short Order of Notice benefit you?**
  It allows you to get in front of a judge faster to ask them to:

  * Stop your landlord from shutting off your utilities
  * Stop your landlord from trying to evict you from your home
  
fields:
  - 'Do you want to request a Short Order of Notice?': issue_a_son
    datatype: yesnoradio
---
terms:
  notice: |
    A notice means officially telling your landlord about a legal action so they know what is happening and has a fair chance to try and fix the problem before going to court.
---
id: request a preliminary injunction
question: |
  It sounds like you may need to request a Preliminary Injunction
subquestion: |
  Based on what you have told us, it sounds like you may benefit in requesting a Preliminary Injunction.
  
  #####What is a Preliminary Injunction?
  A court order that tells your landlord to stop a harmful action. It must be clear and specific about what they need to stop doing. 

  **How is it different from a Temporary Restraining Order?**
  You must notify your landlord of this legal action and the injunction may last longer than 10 days.  

  **Will the judge automatically grant it?**
  No. The judge will weigh: 
  
  1. How likely you are to win your case
  2. How much harm you would face if they said no

  If the judge does not think you would be greatly harmed, they may reject your request. 

  **How would a Preliminary Injunction benefit you?**
  The order can protect you right away without having to wait for a full trial. 
  
  #### For example it could:
  * Stop your landlord from shutting off your utilities
  * Order your landlord to make emergency repairs
  * Stop your landlord from trying to evict you from your home
  
fields:
  - 'Do you want to request a Preliminary Injunction?': request_a_pi
    datatype: yesnoradio
---
id: Mass Civ Pro
mandatory: false
question: |
  Which of the following options (if any) would you like to ask the court to do?
subquestion: |
  We have already checked the boxes that make sense based on your earlier
  answers, but you should review and make any changes as needed.
  
fields:
  - 'Issue a Temporary Restraining Order (valid for 10 days only; may be requested without immediate notice to the other side)': issue_tro
    datatype: yesno
    default: ${ issue_a_tro }
    
  - 'Request a Preliminary Injunction (may be issued for longer than 10 days; notice to the other side is required)': request_pi
    datatype: yesno
    default: ${ request_a_pi }
    
  - 'Issue a Short Order of Notice (a shortened notice period to the other side so the Court can hear this request)': issue_son
    datatype: yesno
    default: ${ issue_a_son }

help: |
  **Temporary Restraining Order (TRO)** <br>
  A TRO is like an emergency "pause button" from a judge. In a housing case, you might ask for this if your landlord tries to illegally evict you before the legal process is finished. A TRO protects your safety and housing for up to 10 days, until a full hearing can happen.

  **Preliminary Injunction** <br>
  A Preliminary Injunction is a court order that lasts longer than a TRO. It keeps things as they are while the court reviews your full case. Unlike a TRO, you must formally notify your landlord first. This gives them a chance to respond and share their side before the judge decides.

  **Short Order of Notice** <br>
  A Short Order of Notice speeds up the court process when you can't wait. Normally, you must give your landlord advance notice before a hearing. But if you're facing homelessness right away, that wait could be too long. A Short Order of Notice asks the judge to shorten that wait, so your case can be heard much sooner.
