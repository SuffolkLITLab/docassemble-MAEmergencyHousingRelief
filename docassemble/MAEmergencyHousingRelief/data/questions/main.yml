id: introduction to interview
continue button field: temporary_restraining_order_intro
question: |
  What does this interview do?
subquestion: |
  This interview will help you file a complaint to get emergency housing relief and issue a temporary restraining order, along with a preliminary injunction and short order notice form.

  ####Does this apply to you?
  1. Are you face a {housing emergency}?
  2. Did your landlord act without a {court order}?
  
  ####What to gather before you start
  
  * Your lease 
  * Proof of income (if you decide to waive the security deposit)
  * Your landlord's information such as their contact information and address
  * The docket number (if you do not have one, you can still continue with the interview)<br>
  [find your docket number](https://www.mass.gov/info-details/how-to-search-court-dockets?_gl=1*1t4lg0v*_ga*Mjc1NTYwNDQxLjE3NDE2MjkwMjA.*_)&nbsp;<sup>:up-right-from-square:&nbsp;(opens in new tab)</sup>
   
  If you do not have any of the above, you can still start the interview without them. Most people take about 15-20 minutes to complete this interview.

  ####After you finish this interview
  When you are finished, you will need to file this petition with the Court, either by eFile using a valid email address or in person with the Clerk's office.

  #####Not the right form for you?
  If you need help but this isn't an emergency situation, ${ btn_legal_services } may be able to assist.
