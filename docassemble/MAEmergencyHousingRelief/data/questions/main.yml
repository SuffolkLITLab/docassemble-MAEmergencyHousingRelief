  Based on the requirements, you must meet all the criteria on the previous screens to be eligible for this specific legal relief. 

  Here is why you may not be eligible based on your answers so far:
  
  % if defined('is_resident') and not is_resident:
  * **Not a Massachusetts Resident:** This process is specifically for Massachusetts residents.
  % endif
  
  % if defined('over_18') and not over_18:
  * **Under 18:** You must be a legal adult (18 or older) to file these forms.
  % endif
  
  % if defined('is_tenant') and not is_tenant:
  * **Not a Tenant:** This process is designed for tenants renting from a landlord.
  % endif
  

  Because you did not meet these requirements, the court may reject your filing. However, you are still allowed to proceed with this interview and generate your forms if you would like to continue.
